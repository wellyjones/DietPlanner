{% extends "layout/base.html" %}
{% block content %}

<div class="card-actions">
    <a href="/workoutLog/list?date={{ log_date }}" class="card-btn">
        ← Back to Workouts
    </a>
</div>

<div class="card">
    <div class="card-content">

        <h3 class="section-title">Edit Workout</h3><br />

        <form method="post">
            <input type="hidden" name="log_date" value="{{ log_date }}">

            <div class="form-group">
                <label>Workout Type</label>
                <input type="text" name="workout_type" value="{{ workout.type }}" required>
            </div>

            <div class="form-group">
                <label>Duration (minutes)</label>
                <input type="number" name="duration_min" value="{{ workout.duration or '' }}">
            </div>

            <div class="form-group">
                <label>Calories Burned</label>
                <input type="number" name="calories" value="{{ workout.calories or '' }}">
            </div>

            <div class="form-group">
                <label>Run Distance (miles)</label>
                <input type="number" step="0.01" name="distance_miles" value="{{ workout.distance or '' }}">
            </div>

            <div class="form-group">
                <label>Run Pace</label>
                <input type="text" name="pace" value="{{ workout.pace or '' }}" placeholder="e.g. 7:45">
            </div>

            <div class="card-actions">
                <button type="submit" class="card-btn">
                    Save and return to dashboard
                </button>
            </div>
        </form>

    </div>
</div>

{% endblock %}
